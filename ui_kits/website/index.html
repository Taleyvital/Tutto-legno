/* ─── TL MONOGRAM SVG ─── */
function TLMonogram({ size = 36, color = "#B8892A" }) {
  const s = size;
  const sw  = s * 0.07;
  const sw2 = s * 0.062;
  const m   = s * 0.03;
  const gap = s * 0.14;
  const ox1 = m, oy1 = m, ox2 = s - m, oy2 = s - m;
  const ix1 = ox1 + gap, iy1 = oy1 + gap, ix2 = ox2 - gap, iy2 = oy2 - gap;
  const tBarY  = iy1 + (iy2 - iy1) * 0.18;
  const tStemX = (ix1 + ix2) / 2;
  const lX     = ix1 + (ix2 - ix1) * 0.22;
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} fill="none" xmlns="http://www.w3.org/2000/svg" style={{ flexShrink: 0 }}>
      <rect x={ox1+sw/2}  y={oy1+sw/2}  width={s-m*2-sw}       height={s-m*2-sw}       stroke={color} strokeWidth={sw}  fill="none"/>
      <rect x={ix1+sw2/2} y={iy1+sw2/2} width={(ix2-ix1)-sw2}  height={(iy2-iy1)-sw2}  stroke={color} strokeWidth={sw2} fill="none"/>
      <line x1={ix1+sw2/2}  y1={tBarY}  x2={ix2-sw2/2}  y2={tBarY}  stroke={color} strokeWidth={sw}  strokeLinecap="square"/>
      <line x1={tStemX}     y1={tBarY}  x2={tStemX}     y2={iy2-sw2/2} stroke={color} strokeWidth={sw}  strokeLinecap="square"/>
      <line x1={lX}         y1={tBarY+sw*0.3} x2={lX}   y2={iy2-sw2/2} stroke={color} strokeWidth={sw}  strokeLinecap="square"/>
      <line x1={lX}         y1={iy2-sw2/2}    x2={ix2-sw2/2} y2={iy2-sw2/2} stroke={color} strokeWidth={sw}  strokeLinecap="square"/>
    </svg>
  );
}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 96, alignItems: "start" }}>

          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.24em", textTransform: "uppercase", color: "#A67C52", marginBottom: 20 }}>Contactez-nous</div>
          <h2 style={{ fontSize: "clamp(24px, 3vw, 44px)", fontWeight: 700, letterSpacing: "-0.02em", lineHeight: 1.1, color: "#F5EFE6", marginBottom: 28 }}>
            Un projet ? Parlons-en.
          </h2>
          <p style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.8, color: "#7A7470", marginBottom: 48 }}>
            Nos experts sont disponibles pour étudier votre projet, établir un devis sur mesure et vous accompagner de la conception à la pose.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            {[
              { label: "Atelier & Showroom", val: "Abidjan, Côte d'Ivoire" },
              { label: "Téléphone", val: "+225 00 00 00 00" },
              { label: "Email", val: "contact@tuttolegno.ci" },
            ].map(c => (
              <div key={c.label}>
                <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", color: "#A67C52", marginBottom: 5 }}>{c.label}</div>
                <div style={{ fontSize: 13, fontWeight: 400, color: "#B8B2AA" }}>{c.val}</div>
              </div>
            ))}
          </div>
        </div>
        <div>
          {sent ? (
            <div style={{ padding: "60px 40px", background: "rgba(166,124,82,0.08)", border: "1px solid rgba(166,124,82,0.2)", textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: "#C9A882", marginBottom: 12 }}>Message envoyé</div>
              <div style={{ fontSize: 13, color: "#7A7470", lineHeight: 1.7 }}>Nous vous répondrons dans les plus brefs délais.</div>
              <button onClick={() => setSent(false)} style={{ marginTop: 24, background: "none", border: "1px solid rgba(201,168,130,0.3)", color: "#C9A882", fontFamily: "var(--font)", fontSize: 9, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", padding: "10px 20px", cursor: "pointer" }}>Nouveau message</button>
            </div>
          ) : (
            <form onSubmit={e => { e.preventDefault(); setSent(true); }} style={{ display: "flex", flexDirection: "column", gap: 28 }}>
              <div>
                <label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", color: "#7A7470", display: "block", marginBottom: 8 }}>Nom complet</label>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="Jean Assouman" required style={inputStyle}
                  onFocus={e => e.target.style.borderBottomColor = "#A67C52"}
                  onBlur={e => e.target.style.borderBottomColor = "rgba(201,168,130,0.25)"} />
              </div>
              <div>
                <label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", color: "#7A7470", display: "block", marginBottom: 8 }}>Adresse email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="jean@exemple.com" required style={inputStyle}
                  onFocus={e => e.target.style.borderBottomColor = "#A67C52"}
                  onBlur={e => e.target.style.borderBottomColor = "rgba(201,168,130,0.25)"} />
              </div>
              <div>
                <label style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", color: "#7A7470", display: "block", marginBottom: 8 }}>Votre projet</label>
                <textarea value={msg} onChange={e => setMsg(e.target.value)} placeholder="Décrivez votre projet — surface, essence de bois souhaitée, délais…" rows={4} required style={{ ...inputStyle, resize: "vertical", lineHeight: 1.7 }}
                  onFocus={e => e.target.style.borderBottomColor = "#A67C52"}
                  onBlur={e => e.target.style.borderBottomColor = "rgba(201,168,130,0.25)"} />
              </div>
              <button type="submit" style={{
                background: "#A67C52", color: "#F5EFE6", border: "none", borderRadius: 2,
                fontFamily: "var(--font)", fontSize: 10, fontWeight: 700, letterSpacing: "0.16em",
                textTransform: "uppercase", padding: "16px 36px", cursor: "pointer", alignSelf: "flex-start",
                transition: "background 400ms ease-out"
              }}
              onMouseEnter={e => e.currentTarget.style.background = "#7A5230"}
              onMouseLeave={e => e.currentTarget.style.background = "#A67C52"}
              >Envoyer la demande</button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

/* ─── FOOTER ─── */

  return (
    <footer style={{ background: "#0E0C0A", padding: "64px 80px 40px", borderTop: "1px solid rgba(201,168,130,0.1)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 60, marginBottom: 60 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <TLMonogram size={40} color="#B8892A" />
            <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#F5EFE6", whiteSpace: "nowrap" }}>TUTTO LEGNO</span>
          </div>
          <p style={{ fontSize: 12, fontWeight: 300, lineHeight: 1.8, color: "#7A7470", maxWidth: 280 }}>
            Menuiserie bois massif haut de gamme.<br/>Abidjan, Côte d'Ivoire.
          </p>
          <div style={{ marginTop: 20, fontSize: 10, fontWeight: 300, letterSpacing: "0.06em", color: "#3E3A36", fontStyle: "italic" }}>
            "Nous faisons de vos rêves une réalité."
          </div>
        </div>
        {[
          { title: "Services", links: ["Portes & fenêtres", "Mobilier sur mesure", "Escaliers", "Parquet & revêtements"] },
          { title: "Entreprise", links: ["Nos réalisations", "À propos", "Atelier", "Contact"] },
          { title: "Contact", links: ["Abidjan, CI", "+225 00 00 00 00", "contact@tuttolegno.ci", "Lun–Ven 8h–17h"] },
        ].map(col => (
          <div key={col.title}>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", color: "#A67C52", marginBottom: 16 }}>{col.title}</div>
            <ul style={{ listStyle: "none", display: "flex", flexDirection: "column", gap: 10 }}>
              {col.links.map(l => (
                <li key={l}><a href="#" style={{ fontSize: 12, fontWeight: 400, color: "#7A7470", textDecoration: "none", transition: "color 300ms ease-out" }}
                  onMouseEnter={e => e.target.style.color = "#C9A882"}
                  onMouseLeave={e => e.target.style.color = "#7A7470"}
                >{l}</a></li>
              ))}
            </ul>
          </div>
        ))}
      </div>
      <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 28, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 10, color: "#3E3A36" }}>© 2024 Tutto Legno. Tous droits réservés.</div>
        <div style={{ fontSize: 10, color: "#3E3A36" }}>Menuiserie haut de gamme · Abidjan</div>
      </div>
    </footer>
  );
}

/* ─── APP ─── */
function App() {
  const [scrolled, setScrolled] = useState(false);
  const [page, setPage] = useState("home"); // home | contact

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", handler);
    return () => window.removeEventListener("scroll", handler);
  }, []);

  return (
    <div>
      <Navbar scrolled={scrolled} />
      <Hero onCTA={() => setPage("contact")} />
      <StatsBand />
      <Services />
      <Realisations />
      <Testimonial />
      <About />
      <Contact visible={page === "contact"} />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
