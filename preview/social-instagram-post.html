<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2C2820; font-family: 'Montserrat', sans-serif; padding: 32px; display: flex; justify-content: center; }

  /* Scale to preview — actual is 1080×1080 */
  .post {
    width: 420px; height: 420px;
    position: relative; overflow: hidden; flex-shrink: 0;
    background: #1C1916;
  }

  /* Striped wood placeholder */
  .wood-bg {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      160deg,
      #3D2810 0px, #3D2810 12px,
      #2A1A08 12px, #2A1A08 28px,
      #4A3020 28px, #4A3020 40px,
      #2A1A08 40px, #2A1A08 56px
    );
    opacity: 0.9;
  }
  .wood-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 11px; font-family: 'Courier New', monospace; color: rgba(201,168,130,0.5);
    text-align: center; line-height: 1.6; pointer-events: none;
  }

  /* Dark overlay gradient */
  .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(12,8,4,0.88) 0%, rgba(12,8,4,0.3) 55%, transparent 100%); }
  .overlay-side { position: absolute; inset: 0; background: linear-gradient(to right, rgba(12,8,4,0.6) 0%, transparent 60%); }

  /* Content */
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 28px; }

  .tl-logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark { width: 24px; height: 24px; background: #A67C52; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark span { font-size: 10px; font-weight: 800; color: #F5EFE6; }
  .logo-text { font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: #F5EFE6; }

  .post-badge {
    display: inline-flex; align-items: center;
    font-size: 8px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    background: #A67C52; color: #F5EFE6;
    padding: 4px 10px; border-radius: 9999px;
    margin-bottom: 10px; width: fit-content;
  }
  .post-title { font-size: 26px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; color: #F5EFE6; margin-bottom: 10px; }
  .post-desc { font-size: 12px; font-weight: 300; line-height: 1.6; letter-spacing: 0.03em; color: #C9A882; }
  .post-footer { display: flex; align-items: flex-end; justify-content: space-between; }
  .post-location { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(201,168,130,0.7); }
  .post-sep { width: 28px; height: 1px; background: #A67C52; display: block; margin: 10px 0 6px; }

  /* Gold accent line */
  .accent-line { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, #D4A853, #7A5230); }
</style>
</head>
<body>
<div class="post">
  <div class="wood-bg"></div>
  <div class="wood-label">photo réalisation<br>1080 × 1080 px</div>
  <div class="overlay"></div>
  <div class="overlay-side"></div>
  <div class="accent-line"></div>
  <div class="content">
    <!-- Header -->
    <div class="tl-logo">
      <div class="logo-mark"><span>TL</span></div>
      <div class="logo-text">Tutto Legno</div>
    </div>
    <!-- Body -->
    <div>
      <div class="post-badge">Réalisation</div>
      <div class="post-title">Porte en chêne<br>massif sculpté</div>
      <div class="post-sep"></div>
      <div class="post-desc">Menuiserie haut de gamme,<br>façonnée à la main à Abidjan.</div>
    </div>
    <!-- Footer -->
    <div class="post-footer">
      <div class="post-location">📍 Cocody, Abidjan · 2024</div>
      <div style="font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,239,230,0.4);">@tuttolegno.ci</div>
    </div>
  </div>
</div>
</body>
</html>
